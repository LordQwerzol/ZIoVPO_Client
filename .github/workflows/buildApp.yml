name: Build ZIoVPO

on:
  pull_request:
    branches: [ master ]
    types: [opened, synchronize, reopen]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt (MSVC)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install aqtinstall
          aqt install-qt windows desktop 6.8.2 win64_msvc2022_64 --outputdir "$env:GITHUB_WORKSPACE/Qt"
          echo "Qt6_DIR=$env:GITHUB_WORKSPACE/Qt/6.8.2/msvc2022_64" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -S "${{ github.workspace }}" `
                -B "${{ github.workspace }}/build/Release" `
                -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
                -DCMAKE_BUILD_TYPE=Release `
                -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}//ZIoVPO_deploy"

      - name: Build and Install
        run: |
          cmake --build "${{ github.workspace }}/build/Release" --config Release --target ALL_BUILD
          cmake --install "${{ github.workspace }}/build/Release" --config Release

      - name: Upload entire deploy folder
        uses: actions/upload-artifact@v4
        with:
          name: ZIoVPO-deploy
          path: ${{ github.workspace }}/ZIoVPO_deploy

      - name: Create MSI installer using CPack
        working-directory: ${{ github.workspace }}/build/Release
        run: cpack -G WIX -C Release

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: ZIoVPO-installer
          path: ${{ github.workspace }}/build/Release/packages/*.msi